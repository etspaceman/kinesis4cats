pull_request_rules:
- name: merge scala-steward's PRs
  conditions:
  - author=etspaceman-scala-steward-app[bot]
  - body~=labels:.*early-semver-patch
  - status-success=Test (ubuntu-24.04, 2.13, temurin@17, rootJS)
  - status-success=Test (ubuntu-24.04, 2.13, temurin@17, rootJVM)
  - status-success=Test (ubuntu-24.04, 2.13, temurin@17, rootNative)
  - status-success=Test (ubuntu-24.04, 3, temurin@17, rootJS)
  - status-success=Test (ubuntu-24.04, 3, temurin@17, rootJVM)
  - status-success=Test (ubuntu-24.04, 3, temurin@17, rootNative)
  actions:
    merge:
      method: squash
