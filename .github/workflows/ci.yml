name: Continuous Integration

on:
  pull_request:
    branches: ['**', '!update/**', '!pr/**']
  push:
    branches: ['**', '!update/**', '!pr/**']
    tags: [v*]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


concurrency:
  group: ${{ github.workflow }} @ ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        scala: [2.13, 3]
        java: [temurin@17]
        project: [rootJS, rootJVM, rootNative]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Java (temurin@17)
        id: setup-java-temurin-17
        if: matrix.java == 'temurin@17'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: sbt update
        if: matrix.java == 'temurin@17' && steps.setup-java-temurin-17.outputs.cache-hit == 'false'
        run: sbt +update

      - name: Install brew formulae (ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: /home/linuxbrew/.linuxbrew/bin/brew install openssl s2n

      - name: Check that workflows are up to date
        run: sbt githubWorkflowCheck

      - name: Check headers and formatting
        if: matrix.java == 'temurin@17' && matrix.os == 'ubuntu-22.04'
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' headerCheckAll scalafmtCheckAll 'project /' scalafmtSbtCheck

      - name: Check scalafix lints
        if: matrix.java == 'temurin@17' && matrix.os == 'ubuntu-22.04'
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' 'scalafixAll --check'

      - name: scalaJSLink
        if: matrix.project == 'rootJS'
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' Test/scalaJSLinkerResult

      - name: nativeLink
        if: matrix.project == 'rootNative'
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' Test/nativeLink

      - name: Test
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' test

      - name: Check binary compatibility
        if: matrix.java == 'temurin@17' && matrix.os == 'ubuntu-22.04'
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' mimaReportBinaryIssues

      - name: Generate API documentation
        if: matrix.java == 'temurin@17' && matrix.os == 'ubuntu-22.04'
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' doc

      - name: Compile (JVM plain projects)
        if: matrix.java == 'temurin@17' && matrix.os == 'ubuntu-22.04' && endsWith(matrix.project, 'JVM') && matrix.scala == '3.3.7'
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' rootJVMPlain3/Test/compile

      - name: Docker Compose Up
        if: matrix.java == 'temurin@17' && matrix.os == 'ubuntu-22.04' && endsWith(matrix.project, 'JVM')
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' dockerComposeUp

      - name: Integration Tests
        if: matrix.java == 'temurin@17' && matrix.os == 'ubuntu-22.04' && endsWith(matrix.project, 'JVM')
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' itTest

      - name: Print docker logs and container listing
        if: ${{ failure() }}
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' dockerComposePs dockerComposeLogs

      - name: Remove docker containers
        if: matrix.java == 'temurin@17' && matrix.os == 'ubuntu-22.04' && endsWith(matrix.project, 'JVM')
        run: sbt 'project ${{ matrix.project }}' '++ ${{ matrix.scala }}' dockerComposeDown

      - name: Make target directories
        if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        run: mkdir -p shared-localstack/.jvm/target kinesis-client/.jvm/target shared-circe/.jvm/target smithy4s-client-logging-circe/.js/target shared/.native/target shared-circe/.native/target kpl-logging-circe/.jvm/target kcl-ciris/.jvm/target kcl-http4s/.jvm/target kinesis-client-localstack/.jvm/target shared-localstack/.js/target kpl-ciris/.jvm/target shared-circe/.js/target unidocs/target kcl-logging-circe/.jvm/target shared/.js/target kcl-localstack/.jvm/target smithy4s-client-logging-circe/.jvm/target shared-ciris/.jvm/target shared-localstack/.native/target smithy4s-client/.native/target smithy4s-client/.js/target kinesis-client-logging-circe/.jvm/target kcl/.jvm/target smithy4s-client-localstack/.jvm/target compat/.js/target smithy4s-client-localstack/.native/target smithy4s-client/.jvm/target shared-ciris/.js/target compat/.native/target feral/.jvm/target kpl/.jvm/target shared/.jvm/target smithy4s-client-localstack/.js/target aws-v2-localstack/.jvm/target feral/.js/target kpl-localstack/.jvm/target compat/.jvm/target shared-ciris/.native/target smithy4s-client-logging-circe/.native/target project/target

      - name: Compress target directories
        if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        run: tar cf targets.tar shared-localstack/.jvm/target kinesis-client/.jvm/target shared-circe/.jvm/target smithy4s-client-logging-circe/.js/target shared/.native/target shared-circe/.native/target kpl-logging-circe/.jvm/target kcl-ciris/.jvm/target kcl-http4s/.jvm/target kinesis-client-localstack/.jvm/target shared-localstack/.js/target kpl-ciris/.jvm/target shared-circe/.js/target unidocs/target kcl-logging-circe/.jvm/target shared/.js/target kcl-localstack/.jvm/target smithy4s-client-logging-circe/.jvm/target shared-ciris/.jvm/target shared-localstack/.native/target smithy4s-client/.native/target smithy4s-client/.js/target kinesis-client-logging-circe/.jvm/target kcl/.jvm/target smithy4s-client-localstack/.jvm/target compat/.js/target smithy4s-client-localstack/.native/target smithy4s-client/.jvm/target shared-ciris/.js/target compat/.native/target feral/.jvm/target kpl/.jvm/target shared/.jvm/target smithy4s-client-localstack/.js/target aws-v2-localstack/.jvm/target feral/.js/target kpl-localstack/.jvm/target compat/.jvm/target shared-ciris/.native/target smithy4s-client-logging-circe/.native/target project/target

      - name: Upload target directories
        if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v5
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-${{ matrix.scala }}-${{ matrix.project }}
          path: targets.tar

  publish:
    name: Publish Artifacts
    needs: [build]
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    strategy:
      matrix:
        os: [ubuntu-22.04]
        java: [temurin@17]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Java (temurin@17)
        id: setup-java-temurin-17
        if: matrix.java == 'temurin@17'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: sbt update
        if: matrix.java == 'temurin@17' && steps.setup-java-temurin-17.outputs.cache-hit == 'false'
        run: sbt +update

      - name: Download target directories (2.13, rootJS)
        uses: actions/download-artifact@v6
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-2.13-rootJS

      - name: Inflate target directories (2.13, rootJS)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Download target directories (2.13, rootJVM)
        uses: actions/download-artifact@v6
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-2.13-rootJVM

      - name: Inflate target directories (2.13, rootJVM)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Download target directories (2.13, rootNative)
        uses: actions/download-artifact@v6
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-2.13-rootNative

      - name: Inflate target directories (2.13, rootNative)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Download target directories (3, rootJS)
        uses: actions/download-artifact@v6
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-3-rootJS

      - name: Inflate target directories (3, rootJS)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Download target directories (3, rootJVM)
        uses: actions/download-artifact@v6
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-3-rootJVM

      - name: Inflate target directories (3, rootJVM)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Download target directories (3, rootNative)
        uses: actions/download-artifact@v6
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-3-rootNative

      - name: Inflate target directories (3, rootNative)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Import signing key
        if: env.PGP_SECRET != '' && env.PGP_PASSPHRASE == ''
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: echo $PGP_SECRET | base64 -d -i - | gpg --import

      - name: Import signing key and strip passphrase
        if: env.PGP_SECRET != '' && env.PGP_PASSPHRASE != ''
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          echo "$PGP_SECRET" | base64 -d -i - > /tmp/signing-key.gpg
          echo "$PGP_PASSPHRASE" | gpg --pinentry-mode loopback --passphrase-fd 0 --import /tmp/signing-key.gpg
          (echo "$PGP_PASSPHRASE"; echo; echo) | gpg --command-fd 0 --pinentry-mode loopback --change-passphrase $(gpg --list-secret-keys --with-colons 2> /dev/null | grep '^sec:' | cut --delimiter ':' --fields 5 | tail -n 1)

      - name: Publish
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_CREDENTIAL_HOST: ${{ secrets.SONATYPE_CREDENTIAL_HOST }}
        run: sbt tlCiRelease

  dependency-submission:
    name: Submit Dependencies
    if: github.event.repository.fork == false && github.event_name != 'pull_request'
    strategy:
      matrix:
        os: [ubuntu-22.04]
        java: [temurin@17]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Java (temurin@17)
        id: setup-java-temurin-17
        if: matrix.java == 'temurin@17'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: sbt update
        if: matrix.java == 'temurin@17' && steps.setup-java-temurin-17.outputs.cache-hit == 'false'
        run: sbt +update

      - name: Submit Dependencies
        uses: scalacenter/sbt-dependency-submission@v2
        with:
          modules-ignore: kinesis4cats-shared-testkit_sjs1_2.13 kinesis4cats-shared-testkit_sjs1_3 kinesis4cats-kinesis4cats_2.13 kinesis4cats-kinesis4cats_3 kinesis4cats-docs_3 kinesis4cats-kinesis4cats_2.13 kinesis4cats-kinesis4cats_3 kinesis4cats-shared-testkit_2.13 kinesis4cats-shared-testkit_3 kinesis4cats-kinesis4cats_2.13 kinesis4cats-kinesis4cats_3 kinesis4cats-kinesis4cats_2.13 kinesis4cats-kinesis4cats_3 kinesis4cats-kcl-http4s-test-server_3 kinesis4cats-smithy4s-client-transformers_3 kinesis4cats-shared-testkit_native0.5_3
          configs-ignore: test scala-tool scala-doc-tool test-internal

  validate-steward:
    name: Validate Steward Config
    strategy:
      matrix:
        os: [ubuntu-22.04]
        java: [temurin@11]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (fast)
        uses: actions/checkout@v6

      - name: Setup Java (temurin@11)
        id: setup-java-temurin-11
        if: matrix.java == 'temurin@11'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - uses: coursier/setup-action@v1
        with:
          apps: scala-steward

      - run: scala-steward validate-repo-config .scala-steward.conf

  site:
    name: Generate Site
    strategy:
      matrix:
        os: [ubuntu-22.04]
        java: [temurin@17]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Java (temurin@17)
        id: setup-java-temurin-17
        if: matrix.java == 'temurin@17'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: sbt update
        if: matrix.java == 'temurin@17' && steps.setup-java-temurin-17.outputs.cache-hit == 'false'
        run: sbt +update

      - name: Generate site
        run: sbt docs/tlSite

      - name: Publish site
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/target/docs/site
          keep_files: true
